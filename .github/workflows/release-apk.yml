name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Sign APK with debug keystore
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          CODEX_DEBUG_KEYSTORE_BASE64: ${{ secrets.CODEX_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}"
          BUILD_TOOLS_DIR="$(ls -d "$SDK_ROOT/build-tools/"* | sort -V | tail -n 1)"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          APK_DIR="app/build/outputs/apk/release"
          UNSIGNED_APK="$APK_DIR/app-release-unsigned.apk"
          OUTPUT_APK="$APK_DIR/CodexMobile.apk"
          KEYSTORE="$HOME/.android/debug.keystore"

          mkdir -p "$HOME/.android"
          if [ -n "${CODEX_DEBUG_KEYSTORE_BASE64:-}" ]; then
            echo "$CODEX_DEBUG_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE"
          elif [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair \
              -keystore "$KEYSTORE" \
              -storetype JKS \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" >/dev/null
          fi

          rm -f "$OUTPUT_APK"
          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$OUTPUT_APK"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            "$OUTPUT_APK"
          "$APKSIGNER" verify --verbose "$OUTPUT_APK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexMobile
          path: app/build/outputs/apk/release/CodexMobile.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-apk
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 本次更新
            - 新会话草稿页、真实模型/权限配置、项目内文件选择和紧凑命令面板整体成型。
            - 会话列表对齐 Codex Desktop：过滤归档/无关会话，修复普通会话分组、默认普通新建、分叉可见性。
            - 消息流增强：过程信息增量展示、最终回复折叠过程、turn 底部操作、耗时、复制、分叉、历史分页和底部刷新。
            - 稳定性修复：会话切换遮罩、防旧快照抢页、运行态租约、后台恢复保持原会话。
            - 移动端改动后的 Desktop 同步重启提示、确认原因说明，以及 App 更新检查/系统下载器/浏览器兜底。
            - UI 统一：新会话页、标题栏、输入 dock、文件面板、全局 loading、operational notice 和应用图标。

            ## Release 产物
            - `CodexMobile.apk`
          files: |
            release-assets/CodexMobile/CodexMobile.apk
