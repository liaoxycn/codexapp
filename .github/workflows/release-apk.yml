name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Sign APK with debug keystore
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}"
          BUILD_TOOLS_DIR="$(ls -d "$SDK_ROOT/build-tools/"* | sort -V | tail -n 1)"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          APK_DIR="app/build/outputs/apk/release"
          UNSIGNED_APK="$APK_DIR/app-release-unsigned.apk"
          OUTPUT_APK="$APK_DIR/CodexMobile.apk"
          KEYSTORE="$HOME/.android/debug.keystore"

          mkdir -p "$HOME/.android"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair \
              -keystore "$KEYSTORE" \
              -storetype JKS \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" >/dev/null
          fi

          rm -f "$OUTPUT_APK"
          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$OUTPUT_APK"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            "$OUTPUT_APK"
          "$APKSIGNER" verify --verbose "$OUTPUT_APK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexMobile
          path: app/build/outputs/apk/release/CodexMobile.apk

  build-gateway:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: desktop-gateway/package-lock.json

      - name: Install dependencies
        working-directory: desktop-gateway
        run: npm ci

      - name: Build Windows gateway executable
        working-directory: desktop-gateway
        run: npm run build:exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-gateway-windows
          path: desktop-gateway/dist/desktop-gateway.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-apk
      - build-gateway
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 本次更新
            - 修复移动端会话列表状态同步，状态完全以 app-server/gateway 返回数据为准。
            - gateway 定时刷新会话列表，覆盖 CodexDesktop 发送、归档、取消归档等跨端变更。
            - 标题栏新增当前会话状态图标，并与列表状态保持一致。
            - 优化会话列表行距和选中状态对齐。

            ## Release 产物
            - `CodexMobile.apk`
            - `desktop-gateway.exe`
          files: |
            release-assets/CodexMobile/CodexMobile.apk
            release-assets/desktop-gateway-windows/desktop-gateway.exe
