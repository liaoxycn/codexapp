name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Sign APK with debug keystore
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          CODEX_DEBUG_KEYSTORE_BASE64: ${{ secrets.CODEX_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}"
          BUILD_TOOLS_DIR="$(ls -d "$SDK_ROOT/build-tools/"* | sort -V | tail -n 1)"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          APK_DIR="app/build/outputs/apk/release"
          UNSIGNED_APK="$APK_DIR/app-release-unsigned.apk"
          OUTPUT_APK="$APK_DIR/CodexMobile.apk"
          KEYSTORE="$HOME/.android/debug.keystore"

          mkdir -p "$HOME/.android"
          if [ -n "${CODEX_DEBUG_KEYSTORE_BASE64:-}" ]; then
            echo "$CODEX_DEBUG_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE"
          elif [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair \
              -keystore "$KEYSTORE" \
              -storetype JKS \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" >/dev/null
          fi

          rm -f "$OUTPUT_APK"
          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$OUTPUT_APK"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            "$OUTPUT_APK"
          "$APKSIGNER" verify --verbose "$OUTPUT_APK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexMobile
          path: app/build/outputs/apk/release/CodexMobile.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-apk
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 本次更新
            - 新增新会话草稿页：启动默认进入草稿，首条消息发送后才创建真实会话；模型、推理强度、权限模式均来自 gateway/app-server 真实配置。
            - 对齐 Codex Desktop 会话目录：过滤归档和非交互线程，修复普通会话误归项目、会话数远超 Desktop、分叉会话不可见等问题。
            - 重做移动端消息流：运行中增量展示思考、命令、工具、搜索等过程；最终回复后收起过程，底部提供复制、分叉和耗时。
            - 优化输入区与抽屉：命令/文件入口更紧凑，项目文件树只展示项目内未排除文件，gateway 连接和 Desktop 重启提示迁移到抽屉。
            - 新增 App 更新能力：启动后异步检查 GitHub latest release，发现新版后可下载 APK 并调用 Android 系统安装器。
            - 增强刷新和历史浏览：底部上滑刷新、顶部下拉加载历史、运行中状态和耗时实时同步。
            - 补充本地构建/部署脚本与协议/流程文档，Release workflow 继续产出 `CodexMobile.apk`。

            ## Release 产物
            - `CodexMobile.apk`
          files: |
            release-assets/CodexMobile/CodexMobile.apk
