name: Build Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Sign APK with debug keystore
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}"
          BUILD_TOOLS_DIR="$(ls -d "$SDK_ROOT/build-tools/"* | sort -V | tail -n 1)"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          APK_DIR="app/build/outputs/apk/release"
          UNSIGNED_APK="$APK_DIR/app-release-unsigned.apk"
          OUTPUT_APK="$APK_DIR/app-release-min-plus.apk"
          KEYSTORE="$HOME/.android/debug.keystore"

          mkdir -p "$HOME/.android"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair \
              -keystore "$KEYSTORE" \
              -storetype JKS \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" >/dev/null
          fi

          rm -f "$OUTPUT_APK"
          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$OUTPUT_APK"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            "$OUTPUT_APK"
          "$APKSIGNER" verify --verbose "$OUTPUT_APK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-min-plus
          path: app/build/outputs/apk/release/app-release-min-plus.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-min-plus.apk
