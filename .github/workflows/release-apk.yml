name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Sign APK with debug keystore
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          CODEX_DEBUG_KEYSTORE_BASE64: ${{ secrets.CODEX_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}"
          BUILD_TOOLS_DIR="$(ls -d "$SDK_ROOT/build-tools/"* | sort -V | tail -n 1)"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          APK_DIR="app/build/outputs/apk/release"
          UNSIGNED_APK="$APK_DIR/app-release-unsigned.apk"
          OUTPUT_APK="$APK_DIR/CodexMobile.apk"
          KEYSTORE="$HOME/.android/debug.keystore"

          mkdir -p "$HOME/.android"
          if [ -n "${CODEX_DEBUG_KEYSTORE_BASE64:-}" ]; then
            echo "$CODEX_DEBUG_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE"
          elif [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair \
              -keystore "$KEYSTORE" \
              -storetype JKS \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" >/dev/null
          fi

          rm -f "$OUTPUT_APK"
          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$OUTPUT_APK"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            "$OUTPUT_APK"
          "$APKSIGNER" verify --verbose "$OUTPUT_APK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexMobile
          path: app/build/outputs/apk/release/CodexMobile.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-apk
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 本次更新
            - 重新设计 Android App 图标，改为深色移动控制台风格，提升桌面和启动器识别度。
            - 修复新会话首条消息时旧会话和新会话来回切换的问题，默认新建会话不再误绑定当前项目。
            - 修复移动端会话数量与 Codex Desktop 不一致的问题，对齐 Desktop 工作区、普通会话和可见性过滤。
            - App 更新检查改为冷启动只检查一次，下载交给 Android 系统下载器。
            - 桌面端同步重启增加二次确认弹窗，说明风险后才真正重启 Codex Desktop。

            ## Release 产物
            - `CodexMobile.apk`
          files: |
            release-assets/CodexMobile/CodexMobile.apk
