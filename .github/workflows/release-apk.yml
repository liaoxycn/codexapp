name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Sign APK with debug keystore
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}"
          BUILD_TOOLS_DIR="$(ls -d "$SDK_ROOT/build-tools/"* | sort -V | tail -n 1)"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          APK_DIR="app/build/outputs/apk/release"
          UNSIGNED_APK="$APK_DIR/app-release-unsigned.apk"
          OUTPUT_APK="$APK_DIR/CodexMobile.apk"
          KEYSTORE="$HOME/.android/debug.keystore"

          mkdir -p "$HOME/.android"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair \
              -keystore "$KEYSTORE" \
              -storetype JKS \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" >/dev/null
          fi

          rm -f "$OUTPUT_APK"
          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" "$OUTPUT_APK"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            "$OUTPUT_APK"
          "$APKSIGNER" verify --verbose "$OUTPUT_APK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexMobile
          path: app/build/outputs/apk/release/CodexMobile.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-apk
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## 本次更新
            - 优化移动端壳 UI 控件：标题栏连接入口改为设置图标，并扩大顶部、抽屉按钮触控区域。
            - 标题栏新增当前会话状态无障碍描述，状态文案复用统一映射。
            - 未连接或连接异常时在会话页顶部固定显示连接提示，避免被消息列表遮挡。
            - 改进搜索、下拉刷新、折叠详情、代码块和快捷操作的无障碍语义。

            ## Release 产物
            - `CodexMobile.apk`
          files: |
            release-assets/CodexMobile/CodexMobile.apk
